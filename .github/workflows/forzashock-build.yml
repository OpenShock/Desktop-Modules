name: ForzaShock / Build

on:
  push:
    branches: ['**']
    paths:
      - 'ForzaShock/**'
      - '.github/workflows/forzashock-build.yml'
  pull_request:
    paths:
      - 'ForzaShock/**'
      - '.github/workflows/forzashock-build.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ForzaShock/ForzaShock.csproj

      - name: Publish & pack module
        run: dotnet publish ForzaShock/ForzaShock.csproj --configuration Release --no-restore -o publish

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenShock.Desktop.Modules.ForzaShock.module
          path: publish/OpenShock.Desktop.Modules.ForzaShock.module.zip
          if-no-files-found: error
