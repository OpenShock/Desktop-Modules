name: ForzaShock / Release

on:
  push:
    tags:
      - 'forzashock/[0-9]+.[0-9]+.[0-9]+'
      - 'forzashock/[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

jobs:
  build:
    uses: ./.github/workflows/forzashock-build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc.') }}
    permissions:
      contents: write
    steps:
      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#forzashock/}" >> "$GITHUB_OUTPUT"

      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: OpenShock.Desktop.Modules.ForzaShock.module
          path: artifacts/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ForzaShock ${{ steps.ver.outputs.version }}
          draft: true
          generate_release_notes: true
          files: artifacts/OpenShock.Desktop.Modules.ForzaShock.module.zip
